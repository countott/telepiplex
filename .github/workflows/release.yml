name: Publish Telepiplex Core image

on:
  push:
    tags:
      - core-v*

permissions:
  contents: read
  packages: write

concurrency:
  group: core-release-${{ github.ref_name }}
  cancel-in-progress: false

env:
  CORE_IMAGE: ghcr.io/${{ github.repository_owner }}/telepiplex-core
  RELEASE_TAG: ${{ github.ref_name }}

jobs:
  validate-core:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Core release source
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip

      - name: Install Core test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pytest setuptools wheel

      - name: Validate immutable Core tag
        run: |
          if [[ ! "$RELEASE_TAG" =~ ^core-v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
            echo "Invalid Core release tag: $RELEASE_TAG" >&2
            exit 1
          fi

      - name: Run Core tests
        env:
          PYTHONPATH: .:sdk/src
        run: python -m pytest -q

      - name: Compile tracked Python
        env:
          PYTHONPATH: .:sdk/src
        run: python -m compileall -q app sdk tools tests

  build-core-image:
    needs: validate-core
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Core release source
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Refuse an existing immutable image tag
        id: version
        run: |
          VERSION="${RELEASE_TAG#core-v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          set +e
          INSPECT_OUTPUT=$(docker buildx imagetools inspect "$CORE_IMAGE:$VERSION" 2>&1)
          INSPECT_STATUS=$?
          set -e
          if [[ "$INSPECT_STATUS" -eq 0 ]]; then
            echo "Core image tag already exists: $CORE_IMAGE:$VERSION" >&2
            exit 1
          fi
          if grep -Eiq 'manifest[ _-]*(unknown|not[ _-]*found)|MANIFEST_UNKNOWN' <<< "$INSPECT_OUTPUT" \
            || grep -Eiq '^ERROR: .+: not found$' <<< "$INSPECT_OUTPUT"; then
            echo "Confirmed unused Core image tag: $CORE_IMAGE:$VERSION"
          else
            echo "Unable to prove Core image tag is unused; refusing publication." >&2
            printf '%s\n' "$INSPECT_OUTPUT" >&2
            exit 1
          fi

      - name: Build and push Core image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.CORE_IMAGE }}:${{ steps.version.outputs.version }}
            ${{ env.CORE_IMAGE }}:latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true
